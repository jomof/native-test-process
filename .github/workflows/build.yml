name: Build

# Builds every configuration the matrix assigns to each runner, proves the
# artifacts are debuggable, and uploads the per-runner zips. The release
# workflow downloads these and publishes them.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  # Reusable: the release workflow calls this to build the same matrix and
  # reuse the per-runner zip artifacts it uploads.
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the cross SDK versions in one place.
  WASI_SDK_VERSION: "25"
  WASI_SDK_RELEASE: "wasi-sdk-25.0"

jobs:
  build:
    name: Build & self-test (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Rust (host)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      # ── Native host debugger for the self-test ───────────────────────
      - name: Install lldb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y lldb llvm
      # macOS ships lldb with the Command Line Tools; Windows ships it with LLVM.

      # ── Cross toolchains (Linux runner only) ─────────────────────────
      - name: Add Rust cross targets (Linux)
        if: runner.os == 'Linux'
        run: |
          rustup target add \
            aarch64-linux-android armv7-linux-androideabi \
            x86_64-linux-android i686-linux-android \
            wasm32-wasip1

      - name: Set up Android NDK (Linux)
        if: runner.os == 'Linux'
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27

      - name: Export NDK path (Linux)
        if: runner.os == 'Linux'
        run: echo "ANDROID_NDK_HOME=${{ steps.ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Install wasi-sdk (Linux)
        if: runner.os == 'Linux'
        run: |
          cd /opt
          curl -L -o wasi-sdk.tar.gz \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/${WASI_SDK_RELEASE}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz"
          sudo tar xzf wasi-sdk.tar.gz
          echo "WASI_SDK_PATH=/opt/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux" >> "$GITHUB_ENV"

      - name: Install wasmtime (Linux)
        if: runner.os == 'Linux'
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      # ── Build ────────────────────────────────────────────────────────
      - name: Build configurations for this runner
        shell: bash
        run: python -m builder build --runner ${{ matrix.runner }}

      # ── Self-test ─────────────────────────────────────────────────────
      # Native configs always validate (lldb is present on every runner). The
      # bleeding-edge WASM/Android debug tooling is allowed to skip if absent,
      # via --allow-skip, so a missing wasm-lldb doesn't fail the build; when
      # the tools ARE present (Linux runner) they run for real.
      - name: Self-test artifacts
        shell: bash
        env:
          SELFTEST_WASM_LLDB: ${{ runner.os == 'Linux' && format('{0}/bin/lldb', env.WASI_SDK_PATH) || '' }}
        run: python -m builder selftest --runner ${{ matrix.runner }} --allow-skip

      - name: Upload zips
        uses: actions/upload-artifact@v4
        with:
          name: fixtures-${{ matrix.runner }}
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7
