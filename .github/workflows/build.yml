name: Build

# Builds the configurations the matrix assigns to each runner, proves the
# artifacts carry usable debug info, and uploads the per-runner zips. The
# release workflow downloads these and publishes them.
#
# Every configuration is gating: native host configs (C++/Rust/Go on
# linux/macos/windows) plus Android (all ABIs) and WASM cross-compilation,
# which run on the Linux runner. A failure in any build or self-test fails CI.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # wasi-sdk: release tag is wasi-sdk-<N>, asset is wasi-sdk-<N>.0-x86_64-linux.
  WASI_SDK_MAJOR: "25"

jobs:
  build:
    name: Build & self-test (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Set up Rust (host)
        uses: dtolnay/rust-toolchain@stable

      # Installed via pip (the ninja PyPI package bundles the binary) rather
      # than a Marketplace action, so everything stays on the Node 24 runtime.
      - name: Set up Ninja
        run: python -m pip install ninja

      # Static debug-info validation uses llvm-dwarfdump (+ llvm-pdbutil on
      # Windows). macOS ships Apple dwarfdump; Windows ships LLVM; Linux needs
      # the llvm package. lldb (for live C++/Rust validation) comes too.
      - name: Install LLVM tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y lldb llvm

      # ── Native build + self-test (gating, all runners) ───────────────
      - name: Build native configurations
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   python -m builder build --platform linux-x86_64 --no-manifest ;;
            macOS)   python -m builder build --platform macos-arm64 --no-manifest ;;
            Windows) python -m builder build --platform windows-x86_64 --no-manifest ;;
          esac

      # ── Cross toolchains + builds (Linux only, gating) ───────────────
      - name: Add Rust cross targets (Linux)
        if: runner.os == 'Linux'
        run: |
          rustup target add \
            aarch64-linux-android armv7-linux-androideabi \
            x86_64-linux-android i686-linux-android \
            wasm32-wasip1

      - name: Set up Android NDK (Linux)
        if: runner.os == 'Linux'
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Install wasi-sdk (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          ver="${WASI_SDK_MAJOR}.0"
          url="https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_MAJOR}/wasi-sdk-${ver}-x86_64-linux.tar.gz"
          echo "Downloading $url"
          curl -fL -o /tmp/wasi-sdk.tar.gz "$url"
          sudo tar -C /opt -xzf /tmp/wasi-sdk.tar.gz
          echo "WASI_SDK_PATH=/opt/wasi-sdk-${ver}-x86_64-linux" >> "$GITHUB_ENV"

      - name: Build Android configurations (Linux)
        if: runner.os == 'Linux'
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          python -m builder build --no-manifest \
            --platform android-arm64-v8a --platform android-armeabi-v7a \
            --platform android-x86_64 --platform android-x86

      - name: Build WASM configurations (Linux)
        if: runner.os == 'Linux'
        run: python -m builder build --no-manifest --platform wasm-wasm32-wasip1

      # ── Self-test everything that built ──────────────────────────────
      # Native C++/Rust validate live under lldb; Go, Windows, Android, and
      # WASM validate statically via llvm-dwarfdump/llvm-pdbutil. --allow-skip
      # only forgives a genuinely missing static tool.
      - name: Self-test artifacts
        shell: bash
        run: python -m builder selftest --runner ${{ matrix.runner }} --allow-skip

      - name: Upload zips
        uses: actions/upload-artifact@v7
        with:
          name: fixtures-${{ matrix.runner }}
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7
